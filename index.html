<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Product Roadmap</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Product Roadmap</h1>
    <p>Building the future, step by step.</p>
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="planned">Planned</button>
      <button class="filter" data-filter="progress">In Progress</button>
      <button class="filter" data-filter="completed">Completed</button>
    </div>
  </header>

  <div id="timeline"></div>
</div>

<script src="script.js"></script>
</body>
</html>
